<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Energy Estimator - Dark Slate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 950 */
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .accent-emerald { color: #10b981; }
        .bg-accent-emerald { background-color: #10b981; }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.5); /* Slate 800 with opacity */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }
        
        .input-field:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .receipt {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        select option {
            background-color: #1e293b;
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-200">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-block p-2 bg-emerald-500/10 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 accent-emerald" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-1">
                Campus <span class="accent-emerald">Energy</span>
            </h1>
            <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest">Efficiency Analytics Dashboard</p>
        </div>

        <!-- Calculator Card -->
        <div class="glass-card p-8 mb-6 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Occupancy</label>
                    <div class="relative">
                        <input type="number" id="people" value="1" min="1" 
                            class="input-field w-full p-4 rounded-xl outline-none transition-all text-lg font-medium">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">Residents</span>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Billing Period</label>
                    <select id="month" class="input-field w-full p-4 rounded-xl outline-none bg-transparent transition-all text-lg font-medium cursor-pointer appearance-none">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July (Peak Load)</option>
                        <option value="7">August (Peak Load)</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December (Low Demand)</option>
                    </select>
                </div>

                <button onclick="calculate()" class="w-full bg-accent-emerald text-slate-950 font-bold py-4 rounded-xl hover:bg-emerald-400 active:scale-95 transition-all shadow-lg text-lg uppercase tracking-widest">
                    Generate Analysis
                </button>
            </div>
        </div>

        <!-- Results Output -->
        <div id="results" class="glass-card p-6 hidden">
            <div class="p-4 rounded-lg bg-slate-900/50">
                <div class="text-xs font-bold text-slate-500 mb-6 text-center tracking-[0.2em]">PROJECTION DATA</div>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-400">Selected Month</span>
                        <span id="resMonth" class="font-medium text-slate-100"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-400">Total Consumption</span>
                        <span id="resKwh" class="font-medium text-slate-100"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-400">Daily Average Cost</span>
                        <span id="resDailyCost" class="font-medium text-slate-100"></span>
                    </div>
                </div>

                <div class="my-6 border-t border-slate-800"></div>
                
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Estimated Monthly Total</span>
                    <span id="resMonthly" class="text-4xl font-extrabold text-white tracking-tighter"></span>
                </div>
            </div>
            
            <div class="mt-6 text-[10px] text-slate-500 text-center leading-relaxed">
                ANALYSIS BASED ON RESIDENTIAL HISTORICAL AGGREGATES. 
                RATES CALCULATED AT $0.135/kWh WITH SEASONAL LOAD ADJUSTMENTS.
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const peopleInput = document.getElementById('people');
            const people = parseInt(peopleInput.value);
            const monthIndex = parseInt(document.getElementById('month').value);
            const monthNames = ["January", "February", "March", "April", "May", "June", 
                              "July", "August", "September", "October", "November", "December"];
            
            if (isNaN(people) || people < 1) return;

            const baseEnergyPerPerson = 8.15;
            const electricityRate = 0.135;
            
            const monthlyMultipliers = [
                0.85, 0.88, 0.95, 1.05, 1.20, 1.40, 
                1.50, 1.45, 1.25, 1.10, 0.95, 0.80
            ];

            const factor = monthlyMultipliers[monthIndex];
            const totalEnergy = people * baseEnergyPerPerson * factor;
            const totalCost = totalEnergy * electricityRate;
            const monthlyCost = totalCost * 30;

            // UI Update
            document.getElementById('resMonth').textContent = monthNames[monthIndex];
            document.getElementById('resKwh').textContent = totalEnergy.toFixed(2) + " kWh";
            document.getElementById('resDailyCost').textContent = "$" + totalCost.toFixed(2);
            document.getElementById('resMonthly').textContent = "$" + monthlyCost.toFixed(2);

            // Show results
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
